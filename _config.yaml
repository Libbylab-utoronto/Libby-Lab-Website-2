# site properties and page defaults
title: Libby Lab
subtitle: COMING SOON to University of Toronto
description: connecting molecular environments to morphogenic control of development
header: images/banners-02.png
footer: images/banners-02.png

# site social media and other links
links:
  email: ashley.libby@crick.ac.uk
  orcid: 0000-0002-8139-8844
  google-scholar: fkzHPL8AAAAJ&hl
  github: Libbya-crick
  bluesky: ashleylibby.bsky.social

### jekyll settings

# show future-dated posts
future: true

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
